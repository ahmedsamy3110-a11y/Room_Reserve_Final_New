<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Room Reserve</title>
  <link rel="stylesheet" href="style.css?v=ui-mobile-ar-final-2026" />
</head>
<body data-current-page="profile" data-protected-page="true">
<header class="site-header">
  <nav class="navbar">
    <a href="index.html" class="brand"><img src="assets/logo.png" alt="Room Reserve Logo"><span>Room Reserve</span></a>
    <ul class="nav-links">
      <li><a href="index.html" data-page="home">Home</a></li>
      <li><a href="about.html" data-page="rooms">Explore Rooms</a></li>
      <li><a href="booking.html" data-page="booking" data-protected-link class="customer-only">Booking</a></li>
      <li><a href="bookings.html" data-page="bookings" data-protected-link class="customer-only">My Bookings</a></li>
      <li><a href="profile.html" data-page="profile" data-protected-link class="customer-only">Profile</a></li>
      <li><a href="admin.html" data-page="admin" class="admin-only">Admin Dashboard</a></li>
    </ul>
    <div class="auth-area">
      <span class="user-chip" id="userChip"></span>
      <a href="login.html" class="signin-link" id="signinLink">Sign In</a>
      <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
    </div>
  </nav>
</header>

<main class="profile-layout">
  <section class="profile-card"><p class="eyebrow">Customer Profile</p><h1>Manage Profile</h1><form id="profileForm"><div class="form-group"><label>Full Name</label><input id="profileName" required></div><div class="form-group"><label>Email</label><input id="profileEmail" disabled></div><button class="btn-primary" type="submit">Save Profile</button></form><div class="message" id="profileMessage"></div></section>
  <section class="profile-card"><p class="eyebrow">Security</p><h2>Change Password</h2><form id="passwordForm"><div class="form-group"><label>Current Password</label><div class="password-wrap"><input id="currentPassword" type="password" required autocomplete="current-password"><button class="password-toggle" type="button" data-toggle-password="currentPassword" aria-label="Show current password">👁</button></div></div><div class="form-group"><label>New Password</label><div class="password-wrap"><input id="newPassword" type="password" required autocomplete="new-password"><button class="password-toggle" type="button" data-toggle-password="newPassword" aria-label="Show new password">👁</button></div></div><button class="btn-soft" type="submit">Update Password</button></form><div class="message" id="passwordMessage"></div></section>
</main>
<footer class="site-footer"><img src="assets/logo.png" alt="Room Reserve Logo"><p>© 2026 Room Reserve. Product-ready hotel booking system.</p></footer>
<script src="script.js?v=ui-mobile-ar-final-2026"></script>
</body>
</html>
